<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bido Mohamed | Engineering Portfolio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f3ee;
    color: #1a1a18;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container {
    max-width: 520px;
    width: 100%;
    text-align: center;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #2a4a3e;
    margin-bottom: 2rem;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.4rem);
    font-weight: 400;
    line-height: 1.15;
    margin-bottom: 1.5rem;
    letter-spacing: -0.01em;
  }

  h1 em {
    font-style: italic;
    color: #2a4a3e;
  }

  .message {
    font-size: 16px;
    color: #6b6b67;
    line-height: 1.75;
    margin-bottom: 2.5rem;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: rgba(0,0,0,0.15);
    margin: 2.5rem auto;
  }

  .links {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .link-btn {
    background: transparent;
    color: #1a1a18;
    padding: 9px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    border: 1px solid rgba(0,0,0,0.15);
    transition: background 0.15s;
  }

  .link-btn:hover { background: rgba(0,0,0,0.05); }

  .link-btn.primary {
    background: #2a4a3e;
    color: white;
    border-color: transparent;
  }

  .link-btn.primary:hover { opacity: 0.88; }

  footer {
    margin-top: 3rem;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="container">
  <p class="eyebrow">Bido Mohamed | Engineering Portfolio</p>

  <h1>Something great<br>is <em>coming soon.</em></h1>

  <p class="message">
    I am currently adding my projects and putting the finishing touches on this portfolio.
    Check back soon, it will be worth the wait.
  </p>

  <div class="divider"></div>

  <div class="links">
    <a class="link-btn primary" href="/cdn-cgi/l/email-protection#a7dec8d2d5e7c2cac6cecb89c4c8ca">Get in touch</a>
    <a class="link-btn" href="https://www.linkedin.com/in/bido-mohamed" target="_blank">LinkedIn</a>
    <a class="link-btn" href="https://github.com/BidoCodeHub" target="_blank">GitHub</a>
  </div>

  <footer>bidomohamed.
